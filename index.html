<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#08090F">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitCore">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%2308090F'/%3E%3Ctext x='50%25' y='52%25' text-anchor='middle' dy='.35em' font-size='100' fill='%23C8FF00'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
<title>FitCore</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#08090F;overflow-x:hidden;-webkit-font-smoothing:antialiased}
body{font-family:'Nunito',sans-serif;color:#EDF2FF}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input::placeholder{color:#647A96;opacity:.5}
select option{background:#1A2235}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1E2D45;border-radius:4px}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.au{animation:up .25s ease both}
.tap:active{transform:scale(.96);opacity:.88}
.pulse{animation:pulse 1s ease infinite}
button{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel" data-presets="react" data-type="module">
const { useState, useEffect, useRef } = React;

const C={bg:"#08090F",card:"#141B26",card2:"#1A2235",surface:"#0F1218",lime:"#C8FF00",cyan:"#00E5FF",coral:"#FF4D6D",amber:"#FFB800",purple:"#A855F7",green:"#22C55E",teal:"#14B8A6",orange:"#F97316",text:"#EDF2FF",sub:"#647A96",border:"#1E2D45",gold:"#FFD700"};
const FH="'Bebas Neue',Impact,sans-serif";
const FB="'Nunito','Segoe UI',sans-serif";

// ─── PERSISTENCE ────────────────────────────────────────────
const STORAGE_KEY = 'fitcore_v2';
function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ─── TIER SYSTEM ────────────────────────────────────────────
const TIERS = {
  free:  { id:"free",  name:"Free",   price:"$0",    color:C.sub,    icon:"🆓" },
  basic: { id:"basic", name:"Basic",  price:"$4.99", color:C.cyan,   icon:"⚡" },
  pro:   { id:"pro",   name:"Pro",    price:"$9.99", color:C.gold,   icon:"👑" },
};
const FEATURES = [
  { label:"Fast Food Guide (3 chains)", free:true, basic:false, pro:false },
  { label:"Fast Food Guide (all 14)", free:false, basic:true, pro:true },
  { label:"Calorie Target", free:true, basic:true, pro:true },
  { label:"Basic Workout Split", free:true, basic:true, pro:true },
  { label:"Workout Calendar", free:true, basic:true, pro:true },
  { label:"No Ads", free:false, basic:true, pro:true },
  { label:"Full Macro Breakdown", free:false, basic:true, pro:true },
  { label:"Home Cook Meal Plan", free:false, basic:true, pro:true },
  { label:"Full Weekly Workout Plan", free:false, basic:true, pro:true },
  { label:"Food Log + Progress Rings", free:false, basic:false, pro:true },
  { label:"Rest Timer", free:false, basic:false, pro:true },
  { label:"Muscle Group Selector", free:false, basic:false, pro:true },
  { label:"Workout History", free:false, basic:false, pro:true },
  { label:"Timeline Goal Tracker", free:false, basic:false, pro:true },
];

// ─── UI ────────────────────────────────────────────────────
const Card=({ch,glow,sx})=>(<div className="au" style={{background:C.card,border:`1px solid ${glow?glow+"44":C.border}`,borderRadius:18,padding:18,marginBottom:12,boxShadow:glow?`0 0 24px ${glow}1A`:"none",...sx}}>{ch}</div>);
const Sec=({ch,color=C.lime})=>(<div style={{fontFamily:FH,fontSize:12,letterSpacing:".22em",color,textTransform:"uppercase",marginBottom:12,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>{ch}</div>);
const Inp=({label,...p})=>(<div>{label&&<div style={{fontFamily:FB,fontSize:10,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".12em",marginBottom:5}}>{label}</div>}<input {...p} style={{width:"100%",background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"11px 12px",color:C.text,fontSize:16,fontFamily:FB,fontWeight:700,outline:"none",...p.style}} onFocus={e=>e.target.style.borderColor=C.lime} onBlur={e=>e.target.style.borderColor=C.border}/></div>);
const Btn=({ch,color=C.lime,onClick,disabled,sx,full=true})=>(<button className="tap" onClick={onClick} disabled={disabled} style={{width:full?"100%":"auto",padding:"13px 20px",borderRadius:13,border:"none",background:disabled?C.card2:`linear-gradient(135deg,${color},${color}CC)`,color:disabled?C.sub:C.bg,fontFamily:FH,fontSize:16,letterSpacing:".1em",cursor:disabled?"not-allowed":"pointer",boxShadow:disabled?"none":`0 4px 18px ${color}44`,marginTop:6,...sx}}>{ch}</button>);
const Tag=({ch,color})=>(<span style={{background:color+"22",color,border:`1px solid ${color}44`,borderRadius:5,padding:"2px 7px",fontSize:10,fontWeight:800,fontFamily:FB,whiteSpace:"nowrap"}}>{ch}</span>);
const SB=({label,value,unit,color=C.lime})=>(<div style={{background:C.card2,borderRadius:13,border:`1px solid ${color}22`,borderLeft:`3px solid ${color}`,padding:"12px"}}><div style={{fontFamily:FB,fontSize:9,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".15em",marginBottom:2}}>{label}</div><div style={{fontFamily:FH,fontSize:24,color,lineHeight:1}}>{value}</div>{unit&&<div style={{fontFamily:FB,fontSize:10,color:C.sub,marginTop:2}}>{unit}</div>}</div>);
const Ring=({pct,color,size=66,stroke=5})=>{const r=(size-stroke)/2,circ=2*Math.PI*r,dash=circ*Math.min(1,pct/100);return(<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={C.card2} strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:"stroke-dasharray .5s ease"}}/></svg>);};
const BackBtn=({onClick})=>(<button className="tap" onClick={onClick} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:9,padding:"7px 14px",color:C.sub,fontFamily:FB,fontSize:11,fontWeight:700,cursor:"pointer",marginBottom:12}}>← Back</button>);

// ─── ENGINE ───────────────────────────────────────────────
const BMR=(w,h,age,g)=>{const kg=w*.4536,cm=h*2.54;return g==="male"?10*kg+6.25*cm-5*age+5:10*kg+6.25*cm-5*age-161};
const ACT={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,veryactive:1.9};
const tCals=(t,g)=>g==="lose"?Math.round(t-500):g==="gain"?Math.round(t+300):Math.round(t+100);
const tMacros=(cals,w,g)=>{const p=Math.round(w*1.05),f=Math.round((cals*(g==="lose"?.27:.30))/9),carbs=Math.round((cals-p*4-f*9)/4);return{protein:p,fat:f,carbs}};
const RATES={lose:{fat:1.1,muscle:0.2},recomp:{fat:0.75,muscle:0.5},gain:{fat:0.4,muscle:0.65}};
function tlCalc(weeks,fatG,muscleG,goal){const r=RATES[goal]||RATES.recomp;const fa=+Math.min(fatG,r.fat*weeks).toFixed(1);const ma=+Math.min(muscleG,r.muscle*weeks).toFixed(1);const fp=fatG>0?Math.round(fa/fatG*100):100;const mp=muscleG>0?Math.round(ma/muscleG*100):100;const wn=Math.max(fatG>0?Math.ceil(fatG/r.fat):0,muscleG>0?Math.ceil(muscleG/r.muscle):0);return{fa,ma,fp,mp,wn}}

// ─── LOCK OVERLAY ───────────────────────────────────────────
function LockedFeature({tierRequired,onUpgrade,children}){
  return(<div style={{position:"relative"}}>
    <div style={{opacity:.25,pointerEvents:"none",userSelect:"none"}}>{children}</div>
    <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"rgba(8,9,15,.85)",borderRadius:16,backdropFilter:"blur(4px)"}}>
      <div style={{fontSize:32,marginBottom:8}}>🔒</div>
      <div style={{fontFamily:FH,fontSize:18,color:C.text,letterSpacing:".06em",marginBottom:4}}>{TIERS[tierRequired].icon} {TIERS[tierRequired].name.toUpperCase()} FEATURE</div>
      <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginBottom:14,textAlign:"center",padding:"0 20px"}}>Unlock with {TIERS[tierRequired].name} plan</div>
      <button className="tap" onClick={onUpgrade} style={{padding:"10px 24px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${TIERS[tierRequired].color},${TIERS[tierRequired].color}CC)`,color:C.bg,fontFamily:FH,fontSize:14,letterSpacing:".08em",cursor:"pointer"}}>UPGRADE → {TIERS[tierRequired].price}/mo</button>
    </div>
  </div>);
}

// ─── PAYWALL ────────────────────────────────────────────────
function PaywallModal({onSelect,onClose,currentTier}){
  const[sel,setSel]=useState("pro");
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:1000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(8px)"}}>
    <div className="au" style={{background:C.card,borderRadius:"24px 24px 0 0",padding:24,width:"100%",maxWidth:640,maxHeight:"90vh",overflowY:"auto"}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontSize:36,marginBottom:8}}>⚡</div>
        <div style={{fontFamily:FH,fontSize:28,color:C.lime,letterSpacing:".06em"}}>UPGRADE FITCORE</div>
        <div style={{fontFamily:FB,fontSize:13,color:C.sub,marginTop:4}}>Choose the plan that fits your goals</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:16}}>
        {Object.values(TIERS).map(tier=>(<div key={tier.id} className="tap" onClick={()=>setSel(tier.id)} style={{padding:"12px 8px",borderRadius:14,border:`2px solid ${sel===tier.id?tier.color:C.border}`,background:sel===tier.id?tier.color+"18":C.card2,cursor:"pointer",textAlign:"center",position:"relative"}}>
          {tier.id==="pro"&&<div style={{position:"absolute",top:-8,left:"50%",transform:"translateX(-50%)",background:`linear-gradient(135deg,${C.gold},${C.amber})`,color:C.bg,fontFamily:FH,fontSize:9,letterSpacing:".1em",padding:"2px 8px",borderRadius:20,whiteSpace:"nowrap"}}>BEST VALUE</div>}
          <div style={{fontSize:22,marginBottom:4}}>{tier.icon}</div>
          <div style={{fontFamily:FH,fontSize:16,color:sel===tier.id?tier.color:C.text,letterSpacing:".05em"}}>{tier.name}</div>
          <div style={{fontFamily:FH,fontSize:20,color:sel===tier.id?tier.color:C.sub,marginTop:2}}>{tier.price}</div>
          <div style={{fontFamily:FB,fontSize:9,color:C.sub}}>{tier.id==="free"?"forever":"/month"}</div>
        </div>))}
      </div>
      <div style={{background:C.card2,borderRadius:14,padding:"14px",marginBottom:16}}>
        {FEATURES.map((f,i)=>{const inc=f[sel];return(<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:i<FEATURES.length-1?`1px solid ${C.border}`:"none"}}>
          <div style={{width:18,height:18,borderRadius:"50%",background:inc?C.green+"22":C.card,border:`1px solid ${inc?C.green:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,flexShrink:0}}>{inc?"✓":"—"}</div>
          <div style={{fontFamily:FB,fontSize:11,color:inc?C.text:C.sub}}>{f.label}</div>
        </div>);})}
      </div>
      {sel!=="free"&&<div style={{background:C.amber+"18",border:`1px solid ${C.amber}33`,borderRadius:10,padding:"10px 14px",marginBottom:12,textAlign:"center"}}><div style={{fontFamily:FB,fontSize:12,color:C.amber,fontWeight:700}}>🎁 7-Day Free Trial — Cancel Anytime</div><div style={{fontFamily:FB,fontSize:11,color:C.sub,marginTop:2}}>Payments via App Store when published</div></div>}
      <Btn ch={sel==="free"?"CONTINUE WITH FREE":`START FREE TRIAL — ${TIERS[sel].name.toUpperCase()}`} color={TIERS[sel].color} onClick={()=>onSelect(sel)}/>
      {currentTier&&<button className="tap" onClick={onClose} style={{width:"100%",padding:"12px",background:"none",border:"none",color:C.sub,fontFamily:FB,fontSize:12,cursor:"pointer",marginTop:8}}>Keep my current plan</button>}
    </div>
  </div>);
}

// ─── ONBOARDING ────────────────────────────────────────────
function Onboarding({onDone}){
  const[step,setStep]=useState(0);
  const[showBFGuide,setShowBFGuide]=useState(false);
  const[f,setF]=useState({gender:"male",age:"",weight:"",height:"",activity:"moderate",goal:"recomp",goalWeight:"",goalBf:"12"});
  const u=(k,v)=>setF(p=>({...p,[k]:v}));
  function finish(){
    const age=+f.age||30,w=+f.weight||163,h=+f.height||70,goalW=+f.goalWeight||w;
    const leanMass=w*.82,fatMass=w*.18;
    const goalFat=goalW*(+f.goalBf/100),goalLean=goalW-goalFat;
    const fatToLose=+Math.max(0,fatMass-goalFat).toFixed(1);
    const muscleToGain=+Math.max(0,goalLean-leanMass).toFixed(1);
    const b=BMR(w,h,age,f.gender),t=b*(ACT[f.activity]||1.55);
    const calories=tCals(t,f.goal),macros=tMacros(calories,w,f.goal);
    onDone({calories,macros,fatToLose,muscleToGain,leanMass,fatMass,goal:f.goal,weight:w,bf:18,workoutDays:f.goal==="gain"?5:4});
  }
  const steps=[
    {title:"Let's Build Your Plan",sub:"Quick setup — 3 steps",content:(<div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        {["male","female"].map(g=>(<div key={g} className="tap" onClick={()=>u("gender",g)} style={{flex:1,padding:16,borderRadius:14,border:`2px solid ${f.gender===g?C.lime:C.border}`,background:f.gender===g?C.lime+"18":C.card2,textAlign:"center",cursor:"pointer"}}>
          <div style={{fontSize:32,marginBottom:6}}>{g==="male"?"♂️":"♀️"}</div>
          <div style={{fontFamily:FB,fontSize:14,fontWeight:800,color:f.gender===g?C.lime:C.sub,textTransform:"capitalize"}}>{g}</div>
        </div>))}
      </div>
      <Inp label="Age" type="number" placeholder="Enter your age" value={f.age} onChange={e=>u("age",e.target.value)}/>
    </div>)},
    {title:"Your Body",sub:"Current stats",content:(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
      <Inp label="Weight (lbs)" type="number" placeholder="163" value={f.weight} onChange={e=>u("weight",e.target.value)}/>
      <Inp label="Height (in)" type="number" placeholder="70" value={f.height} onChange={e=>u("height",e.target.value)}/>
      <div style={{gridColumn:"1/-1"}}>
        <div style={{fontFamily:FB,fontSize:10,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".12em",marginBottom:8}}>How Active Are You?</div>
        {[["sedentary","😴 Sitting — desk job"],["light","🚶 Light — 1–3x/week"],["moderate","🏃 Moderate — 3–5x/week"],["active","💪 Very active — 6–7x/week"]].map(([k,v])=>(<div key={k} className="tap" onClick={()=>u("activity",k)} style={{padding:"11px 14px",borderRadius:11,border:`1.5px solid ${f.activity===k?C.lime:C.border}`,background:f.activity===k?C.lime+"12":C.card2,cursor:"pointer",marginBottom:7}}>
          <div style={{fontFamily:FB,fontSize:12,fontWeight:700,color:f.activity===k?C.lime:C.text}}>{v}</div>
        </div>))}
      </div>
    </div>)},
    {title:"Your Goal",sub:"What are you working toward?",content:(<div>
      {[["lose","🔥 Lose Fat","Cut calories, get shredded",C.coral],["recomp","⚡ Recomposition","Lose fat & build muscle",C.lime],["gain","💪 Build Muscle","Bulk up, add size",C.cyan]].map(([k,label,desc,col])=>(<div key={k} className="tap" onClick={()=>u("goal",k)} style={{padding:"16px",borderRadius:14,border:`2px solid ${f.goal===k?col:C.border}`,background:f.goal===k?col+"18":C.card2,cursor:"pointer",marginBottom:10}}>
        <div style={{fontFamily:FB,fontSize:15,fontWeight:800,color:f.goal===k?col:C.text}}>{label}</div>
        <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginTop:3}}>{desc}</div>
      </div>))}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:4}}>
        <Inp label="Goal Weight (lbs)" type="number" placeholder="170" value={f.goalWeight} onChange={e=>u("goalWeight",e.target.value)}/>
        <div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:5}}>
            <div style={{fontFamily:FB,fontSize:10,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".12em"}}>Target BF %</div>
            <button className="tap" onClick={()=>setShowBFGuide(true)} style={{width:18,height:18,borderRadius:"50%",background:C.cyan+"22",border:`1px solid ${C.cyan}`,color:C.cyan,fontFamily:FB,fontSize:10,fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0}}>?</button>
          </div>
          <input type="number" placeholder="12" value={f.goalBf} onChange={e=>u("goalBf",e.target.value)} style={{width:"100%",background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"11px 12px",color:C.text,fontSize:16,fontFamily:FB,fontWeight:700,outline:"none"}}/>
          <div style={{fontFamily:FB,fontSize:10,color:C.sub,marginTop:4,fontStyle:"italic"}}>Not sure? Tap the ? for a visual guide</div>
        </div>
      </div>
    </div>)},
  ];
  return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",padding:"0 16px 24px"}}>
    <div style={{paddingTop:24,paddingBottom:20,textAlign:"center"}}>
      <div style={{fontFamily:FH,fontSize:32,color:C.lime,letterSpacing:".1em"}}>⚡ FITCORE</div>
      <div style={{fontFamily:FB,fontSize:11,color:C.sub,letterSpacing:".15em",textTransform:"uppercase",marginTop:2}}>Your Body · Your Plan · Your Story</div>
    </div>
    <div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:24}}>{steps.map((_,i)=>(<div key={i} style={{width:i===step?24:8,height:8,borderRadius:4,background:i<=step?C.lime:C.card2,transition:"all .3s"}}/>))}</div>
    <div style={{flex:1,maxWidth:480,margin:"0 auto",width:"100%"}}>
      <div style={{marginBottom:20}}>
        <div style={{fontFamily:FH,fontSize:30,color:C.lime,letterSpacing:".04em"}}>{steps[step].title}</div>
        <div style={{fontFamily:FB,fontSize:13,color:C.sub,marginTop:2}}>{steps[step].sub}</div>
      </div>
      {steps[step].content}
    </div>
    <div style={{maxWidth:480,margin:"16px auto 0",width:"100%",display:"flex",gap:10}}>
      {step>0&&<button className="tap" onClick={()=>setStep(step-1)} style={{flex:1,padding:14,borderRadius:13,border:`1px solid ${C.border}`,background:"transparent",color:C.sub,fontFamily:FH,fontSize:14,letterSpacing:".1em",cursor:"pointer"}}>← BACK</button>}
      {step<steps.length-1
        ?<Btn ch="NEXT →" onClick={()=>setStep(step+1)} color={C.lime} sx={{flex:1,marginTop:0}}/>
        :<Btn ch="BUILD MY PLAN 🚀" onClick={finish} color={C.lime} sx={{flex:1,marginTop:0}}/>}
    </div>
    {showBFGuide&&<BFGuideModal gender={f.gender} onClose={()=>setShowBFGuide(false)} onPick={v=>{u("goalBf",String(v));setShowBFGuide(false);}}/>}
  </div>);
}

// ─── BF GUIDE MODAL ─────────────────────────────────────────
function BFGuideModal({gender,onClose,onPick}){
  const[picked,setPicked]=useState(gender==="female"?22:12);
  const[imgError,setImgError]=useState(false);
  // Recommended targets by gender (used in the picker)
  const presets=gender==="female"
    ?[{bf:16,label:"Athletic"},{bf:20,label:"Fit",rec:true},{bf:24,label:"Healthy",rec:true},{bf:28,label:"Average"},{bf:32,label:"Above Avg"}]
    :[{bf:8,label:"Shredded"},{bf:12,label:"Athletic",rec:true},{bf:15,label:"Fit",rec:true},{bf:20,label:"Average"},{bf:25,label:"Above Avg"}];
  const[imgIdx,setImgIdx]=useState(0);
  // Try both lowercase and uppercase PNG extensions (GitHub Pages is case-sensitive)
  const imgVariants=gender==="female"?["bf-women.png","bf-women.PNG","bf-women.jpg","bf-women.jpeg"]:["bf-men.png","bf-men.PNG","bf-men.jpg","bf-men.jpeg"];
  const imgFile=imgVariants[imgIdx];
  return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:2000,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(8px)"}}>
    <div className="au" style={{background:C.card,borderRadius:"24px 24px 0 0",padding:20,width:"100%",maxWidth:640,maxHeight:"92vh",overflowY:"auto"}}>
      <div style={{textAlign:"center",marginBottom:14}}>
        <div style={{fontFamily:FH,fontSize:24,color:C.cyan,letterSpacing:".06em"}}>📏 BODY FAT GUIDE</div>
        <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginTop:4}}>Find your range, then pick your target</div>
      </div>
      <div style={{background:C.cyan+"11",border:`1px solid ${C.cyan}33`,borderRadius:10,padding:"10px 13px",marginBottom:14}}>
        <div style={{fontFamily:FB,fontSize:11,color:C.cyan,fontWeight:700,marginBottom:4}}>💡 How to use this</div>
        <div style={{fontFamily:FB,fontSize:11,color:C.sub,lineHeight:1.6}}>1. Find the body that looks closest to where you want to be. 2. Pick your target % below. Most people aim for "Fit" or "Athletic" as a long-term goal.</div>
      </div>
      {/* Chart image — falls back to text guide if image missing */}
      {!imgError?(<div style={{borderRadius:14,overflow:"hidden",marginBottom:14,background:C.card2,border:`1px solid ${C.border}`}}>
        <img src={imgFile} alt={`Body Fat Chart (${gender})`} onError={()=>{if(imgIdx<imgVariants.length-1)setImgIdx(imgIdx+1);else setImgError(true);}} style={{width:"100%",display:"block"}}/>
      </div>):(<div style={{background:C.amber+"18",border:`1px solid ${C.amber}33`,borderRadius:11,padding:"12px 14px",marginBottom:14}}>
        <div style={{fontFamily:FB,fontSize:12,color:C.amber,fontWeight:700,marginBottom:4}}>📷 Chart image not loaded</div>
        <div style={{fontFamily:FB,fontSize:11,color:C.sub,lineHeight:1.6}}>Upload <b style={{color:C.text}}>{imgVariants[0]}</b> (or .PNG / .jpg) to the same folder as index.html.</div>
      </div>)}
      {/* Quick presets */}
      <div style={{marginBottom:14}}>
        <div style={{fontFamily:FB,fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".12em",marginBottom:8}}>Quick Pick</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:6}}>
          {presets.map((p,i)=>(<div key={i} className="tap" onClick={()=>setPicked(p.bf)} style={{background:picked===p.bf?C.cyan+"22":C.card2,border:`1.5px solid ${picked===p.bf?C.cyan:p.rec?C.lime+"66":C.border}`,borderRadius:10,padding:"10px 4px",cursor:"pointer",textAlign:"center"}}>
            <div style={{fontFamily:FH,fontSize:18,color:picked===p.bf?C.cyan:C.text}}>{p.bf}%</div>
            <div style={{fontFamily:FB,fontSize:9,color:picked===p.bf?C.cyan:C.sub,fontWeight:700,marginTop:2}}>{p.label}</div>
            {p.rec&&<div style={{fontFamily:FB,fontSize:8,color:C.lime,fontWeight:800,marginTop:2}}>⭐ POPULAR</div>}
          </div>))}
        </div>
      </div>
      {/* Custom number stepper */}
      <div style={{background:C.card2,borderRadius:14,padding:"14px",marginBottom:14,border:`1px solid ${C.border}`}}>
        <div style={{fontFamily:FB,fontSize:11,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".12em",marginBottom:10,textAlign:"center"}}>Your Target</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:14}}>
          <button className="tap" onClick={()=>setPicked(Math.max(5,picked-1))} style={{width:46,height:46,borderRadius:12,border:`1.5px solid ${C.border}`,background:C.card,color:C.cyan,fontFamily:FH,fontSize:22,cursor:"pointer"}}>−</button>
          <div style={{textAlign:"center",minWidth:100}}>
            <div style={{fontFamily:FH,fontSize:48,color:C.cyan,lineHeight:1}}>{picked}<span style={{fontSize:24}}>%</span></div>
            <div style={{fontFamily:FB,fontSize:10,color:C.sub,marginTop:2}}>body fat target</div>
          </div>
          <button className="tap" onClick={()=>setPicked(Math.min(50,picked+1))} style={{width:46,height:46,borderRadius:12,border:`1.5px solid ${C.border}`,background:C.card,color:C.cyan,fontFamily:FH,fontSize:22,cursor:"pointer"}}>+</button>
        </div>
      </div>
      <Btn ch={`✓ USE ${picked}% AS MY TARGET`} color={C.cyan} onClick={()=>onPick(picked)}/>
      <button className="tap" onClick={onClose} style={{width:"100%",padding:"12px",background:"none",border:`1px solid ${C.border}`,borderRadius:11,color:C.sub,fontFamily:FH,fontSize:13,cursor:"pointer",marginTop:8,letterSpacing:".08em"}}>✕ CANCEL</button>
    </div>
  </div>);
}

// ─── FOOD ITEM DETAIL ───────────────────────────────────────
function FoodItemDetail({item,chain,details,tier,onUpgrade,onBack}){
  const[selAddons,setSelAddons]=useState({});
  const isPro=tier==="pro";
  // Compute live macros with selected add-ons
  const totals=Object.keys(selAddons).reduce((acc,key)=>{
    if(selAddons[key]&&ADDONS[key]){
      acc.cal+=ADDONS[key].cal;acc.p+=ADDONS[key].p;acc.c+=ADDONS[key].c;acc.f+=ADDONS[key].f;
    }
    return acc;
  },{cal:item.cal,p:item.p,c:item.c,f:item.f});
  function toggle(key){setSelAddons(p=>({...p,[key]:!p[key]}));}

  return(<div>
    <BackBtn onClick={onBack}/>
    <div style={{background:`linear-gradient(135deg,${chain.color}22,${chain.color}08)`,border:`1.5px solid ${chain.color}44`,borderRadius:18,padding:18,marginBottom:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
        <span style={{fontSize:24}}>{chain.emoji}</span>
        <div style={{fontFamily:FB,fontSize:11,color:C.sub,letterSpacing:".1em",textTransform:"uppercase"}}>{chain.chain}</div>
      </div>
      <div style={{fontFamily:FH,fontSize:22,color:chain.color,letterSpacing:".04em",lineHeight:1.2}}>{item.n}</div>
    </div>
    {/* Live macro display */}
    <Card glow={chain.color} ch={<div>
      <Sec ch={Object.values(selAddons).some(v=>v)?"Live Macros (with your add-ons)":"Macros"} color={chain.color}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8}}>
        <div style={{textAlign:"center",background:C.card2,borderRadius:10,padding:"10px 6px",borderLeft:`3px solid ${chain.color}`}}><div style={{fontFamily:FH,fontSize:20,color:chain.color}}>{totals.cal}</div><div style={{fontFamily:FB,fontSize:9,color:C.sub,textTransform:"uppercase",letterSpacing:".1em"}}>kcal</div></div>
        <div style={{textAlign:"center",background:C.card2,borderRadius:10,padding:"10px 6px",borderLeft:`3px solid ${C.cyan}`}}><div style={{fontFamily:FH,fontSize:20,color:C.cyan}}>{totals.p}</div><div style={{fontFamily:FB,fontSize:9,color:C.sub,textTransform:"uppercase",letterSpacing:".1em"}}>protein</div></div>
        <div style={{textAlign:"center",background:C.card2,borderRadius:10,padding:"10px 6px",borderLeft:`3px solid ${C.lime}`}}><div style={{fontFamily:FH,fontSize:20,color:C.lime}}>{totals.c}</div><div style={{fontFamily:FB,fontSize:9,color:C.sub,textTransform:"uppercase",letterSpacing:".1em"}}>carbs</div></div>
        <div style={{textAlign:"center",background:C.card2,borderRadius:10,padding:"10px 6px",borderLeft:`3px solid ${C.coral}`}}><div style={{fontFamily:FH,fontSize:20,color:C.coral}}>{totals.f}</div><div style={{fontFamily:FB,fontSize:9,color:C.sub,textTransform:"uppercase",letterSpacing:".1em"}}>fat</div></div>
      </div>
      {Object.values(selAddons).some(v=>v)&&<div style={{marginTop:10,fontFamily:FB,fontSize:11,color:C.lime,textAlign:"center"}}>Base: {item.cal}kcal · +{totals.cal-item.cal} from add-ons</div>}
    </div>}/>
    {/* How to order */}
    {details?(<Card glow={C.amber} ch={<div>
      <Sec ch="🗣 How To Order" color={C.amber}/>
      <div style={{background:C.amber+"11",border:`1px solid ${C.amber}33`,borderRadius:10,padding:"10px 13px",marginBottom:10}}>
        <div style={{fontFamily:FB,fontSize:11,color:C.amber,fontWeight:700,marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>At the counter:</div>
        <div style={{fontFamily:FB,fontSize:13,color:C.text,lineHeight:1.6,fontStyle:"italic"}}>{details.order}</div>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontFamily:FB,fontSize:11,color:C.sub,fontWeight:700,marginBottom:4,textTransform:"uppercase",letterSpacing:".1em"}}>Comes with:</div>
        <div style={{fontFamily:FB,fontSize:12,color:C.text,lineHeight:1.6}}>{details.includes}</div>
      </div>
      <div style={{background:C.card2,borderRadius:8,padding:"8px 12px",fontFamily:FB,fontSize:11,color:C.sub,lineHeight:1.6}}>💡 {details.macroNote}</div>
    </div>}/>):(<Card ch={<div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontFamily:FB,fontSize:12,color:C.sub,lineHeight:1.6}}>✓ {item.note}</div>

const EX_SETS={"Squat":"4×6","Deadlift":"3×5","Bench Press":"4×8","Bent-Over Row":"3×8","Shoulder Press":"3×10","Pull-Ups":"4×8","Bicep Curl":"3×12","Lunge":"3×12","Plank":"3×45s","Walk":"25 min","Romanian Deadlift":"3×12","Hip Thrust":"3×15","Lat Pulldown":"4×12","Tricep Pushdown":"3×12","Lateral Raises":"3×15","Incline DB Press":"3×10","Leg Press":"4×12","Calf Raises":"4×15","Face Pulls":"3×15","Dips":"3×12","Pec Deck":"3×15","Leg Extension":"4×15","Leg Curl":"3×15","Hack Squat":"4×12","Hyperextensions":"3×15","Bulgarian Split Squat":"3×10","Hammer Curl":"3×12","Cable Row":"3×12"};
const REST_SEC={"Squat":180,"Deadlift":180,"Bench Press":180,"Bent-Over Row":150,"Pull-Ups":150,"Shoulder Press":150,"Romanian Deadlift":120,"Hip Thrust":120,"Hack Squat":150,"Leg Press":120,"Bulgarian Split Squat":120,"Lunge":90,"Incline DB Press":90,"Lat Pulldown":90,"Cable Row":90,"Dips":90,"Hyperextensions":90,"Face Pulls":60,"Leg Extension":60,"Leg Curl":60,"Calf Raises":60,"Bicep Curl":60,"Hammer Curl":60,"Tricep Pushdown":60,"Lateral Raises":60,"Pec Deck":60,"Plank":45,"Walk":0};

function RestTimer({exName,onClose}){
  const def=REST_SEC[exName]??90;
  const[secs,setSecs]=useState(def);
  const[running,setRunning]=useState(false);
  const[done,setDone]=useState(false);
  const intervalRef=useRef(null);
  useEffect(()=>{
    if(running){
      intervalRef.current=setInterval(()=>{
        setSecs(s=>{
          if(s<=1){clearInterval(intervalRef.current);setRunning(false);setDone(true);try{new AudioContext().resume();}catch(e){}return 0;}
          return s-1;
        });
      },1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[running]);
  function start(){setSecs(def);setDone(false);setRunning(true);}
  function pause(){clearInterval(intervalRef.current);setRunning(false);}
  function reset(){clearInterval(intervalRef.current);setRunning(false);setDone(false);setSecs(def);}
  if(def===0)return(<div style={{background:C.card2,borderRadius:14,padding:"14px 16px",marginBottom:12,border:`1px solid ${C.teal}33`}}>
    <div style={{fontFamily:FB,fontSize:12,color:C.teal,marginBottom:4}}>🏃 Cardio — no rest, keep moving!</div>
    <button className="tap" onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 14px",color:C.sub,fontFamily:FB,fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Close</button>
  </div>);
  const pct=Math.round((1-secs/def)*100);
  const col=done?C.green:secs<=10?C.coral:secs<=30?C.amber:C.cyan;
  const m=Math.floor(secs/60),s=secs%60;
  return(<div style={{background:C.card2,borderRadius:16,padding:20,marginBottom:12,border:`2px solid ${col}44`,textAlign:"center"}}>
    <div style={{fontFamily:FH,fontSize:13,color:C.sub,letterSpacing:".15em",marginBottom:4}}>REST TIMER</div>
    <div style={{fontFamily:FB,fontSize:11,color:C.sub,marginBottom:14}}>{def===180?"Heavy compound — 3 min recovery":def===150?"Compound — 2.5 min":def===120?"Moderate — 2 min":def===90?"Accessory — 90 sec":def===60?"Isolation — 60 sec":"Core — 45 sec"}</div>
    <div style={{position:"relative",display:"inline-block",marginBottom:16}}>
      <Ring pct={pct} color={col} size={140} stroke={9}/>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        {done?<div style={{fontFamily:FH,fontSize:24,color:C.green}}>GO! 💪</div>:<div style={{fontFamily:FH,fontSize:42,color:col,lineHeight:1}}>{m}:{s.toString().padStart(2,"0")}</div>}
      </div>
    </div>
    <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:10,flexWrap:"wrap"}}>
      {!running&&!done&&<button className="tap" onClick={start} style={{padding:"10px 22px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${col},${col}CC)`,color:C.bg,fontFamily:FH,fontSize:15,letterSpacing:".08em",cursor:"pointer"}}>{secs<def?"▶ RESUME":"▶ START"}</button>}
      {running&&<button className="tap" onClick={pause} style={{padding:"10px 22px",borderRadius:12,border:`1.5px solid ${C.amber}`,background:C.amber+"18",color:C.amber,fontFamily:FH,fontSize:15,letterSpacing:".08em",cursor:"pointer"}}>⏸ PAUSE</button>}
      {done&&<button className="tap" onClick={start} style={{padding:"10px 22px",borderRadius:12,border:"none",background:`linear-gradient(135deg,${C.green},${C.green}CC)`,color:C.bg,fontFamily:FH,fontSize:15,letterSpacing:".08em",cursor:"pointer"}}>↺ AGAIN</button>}
      <button className="tap" onClick={reset} style={{padding:"10px 16px",borderRadius:12,border:`1.5px solid ${C.border}`,background:"transparent",color:C.sub,fontFamily:FH,fontSize:15,cursor:"pointer"}}>↺</button>
    </div>
    <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
      {[30,45,60,90,120,180].map(t=>(<button key={t} className="tap" onClick={()=>{clearInterval(intervalRef.current);setRunning(false);setDone(false);setSecs(t);}} style={{padding:"4px 10px",borderRadius:8,border:`1px solid ${secs===t&&!running?col:C.border}`,background:secs===t&&!running?col+"18":"transparent",color:secs===t&&!running?col:C.sub,fontFamily:FB,fontSize:10,fontWeight:700,cursor:"pointer"}}>{t<60?`${t}s`:`${t/60}m`}</button>))}
    </div>
    <button className="tap" onClick={onClose} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 16px",color:C.sub,fontFamily:FB,fontSize:11,fontWeight:700,cursor:"pointer"}}>✕ Close Timer</button>
  </div>);
}

// ─── WORKOUT CALENDAR ────────────────────────────────────
function WorkoutCalendar({tracker}){
  const[date,setDate]=useState(new Date());
  const year=date.getFullYear(),month=date.getMonth();
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const today=new Date();
  function workedOut(d){const ds=new Date(year,month,d).toLocaleDateString();return tracker[ds]&&Object.keys(tracker[ds]).length>0;}
  function isToday(d){return d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();}
  function isFuture(d){const cd=new Date(year,month,d);return cd>today;}
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const totalDays=Object.keys(tracker).filter(k=>{const dt=new Date(k);return dt.getMonth()===month&&dt.getFullYear()===year;}).length;
  return(<Card glow={C.purple} ch={<div>
    <Sec ch="Workout Calendar" color={C.purple}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <button className="tap" onClick={()=>setDate(new Date(year,month-1,1))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:C.sub,fontFamily:FH,fontSize:14,cursor:"pointer"}}>‹</button>
      <div style={{textAlign:"center"}}>
        <div style={{fontFamily:FH,fontSize:18,color:C.purple,letterSpacing:".06em"}}>{monthNames[month]} {year}</div>
        <div style={{fontFamily:FB,fontSize:11,color:C.sub,marginTop:2}}>{totalDays} workout{totalDays!==1?"s":""} this month</div>
      </div>
      <button className="tap" onClick={()=>setDate(new Date(year,month+1,1))} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:8,padding:"6px 12px",color:C.sub,fontFamily:FH,fontSize:14,cursor:"pointer"}}>›</button>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:6}}>
      {["S","M","T","W","T","F","S"].map((d,i)=>(<div key={i} style={{textAlign:"center",fontFamily:FH,fontSize:10,color:C.sub,letterSpacing:".1em",padding:"4px 0"}}>{d}</div>))}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
      {cells.map((d,i)=>{if(!d)return(<div key={i}/>);const w=workedOut(d),t=isToday(d),fut=isFuture(d);return(<div key={i} style={{aspectRatio:"1",borderRadius:8,background:w?C.lime+"33":t?C.cyan+"22":C.card2,border:`1.5px solid ${w?C.lime:t?C.cyan:fut?"transparent":C.border}`,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",opacity:fut?.4:1}}>
        <div style={{fontFamily:FH,fontSize:14,color:w?C.lime:t?C.cyan:C.text}}>{d}</div>
        {w&&<div style={{fontSize:10}}>💪</div>}
      </div>);})}
    </div>
    <div style={{display:"flex",gap:14,justifyContent:"center",marginTop:14}}>
      <div style={{display:"flex",alignItems:"center",gap:5}}><div style={{width:12,height:12,borderRadius:3,background:C.lime+"33",border:`1.5px solid ${C.lime}`}}/><span style={{fontFamily:FB,fontSize:10,color:C.sub}}>Worked Out</span></div>

// ─── WORKOUT TAB ──────────────────────────────────────────
function WorkoutTab({tier,results,onUpgrade,tracker,setTracker}){
  const[selEx,setSelEx]=useState(null);
  const[showTimer,setShowTimer]=useState(false);
  const[logF,setLogF]=useState({sets:"3",reps:"10",weight:""});
  const[days,setDays]=useState(4);
  const[selMuscles,setSelMuscles]=useState([]);
  const todayStr=new Date().toLocaleDateString();
  const goal=results?.goal||"recomp";
  const gCol={gain:C.cyan,lose:C.coral,recomp:C.lime}[goal];
  const freeSplit=BASIC_SPLITS.find(s=>s.goal===goal)||BASIC_SPLITS[2];
  const week=buildWeek(days,goal);
  const todayIdx=new Date().getDay()===0?6:new Date().getDay()-1;
  const todayDay=D7[todayIdx];
  function logSet(name){const dl=tracker[todayStr]||{},el=dl[name]||[];setTracker({...tracker,[todayStr]:{...dl,[name]:[...el,{sets:logF.sets,reps:logF.reps,weight:logF.weight,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]}});setLogF({sets:"3",reps:"10",weight:""});}
  const getLog=n=>((tracker[todayStr]||{})[n])||[];
  const customExs=MUSCLE_GROUPS.filter(mg=>selMuscles.includes(mg.key)).flatMap(mg=>mg.exercises).filter((ex,i,arr)=>arr.indexOf(ex)===i);

  if(selEx){return(<div>
    <BackBtn onClick={()=>{setSelEx(null);setShowTimer(false);}}/>
    <Card glow={gCol} ch={<div style={{background:C.card2,borderRadius:14,padding:"18px",textAlign:"center",border:`1px solid ${gCol}33`}}>
      <div style={{fontFamily:FH,fontSize:28,color:gCol,letterSpacing:".06em",marginBottom:6}}>{selEx}</div>
      <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginBottom:8}}>{EX_SETS[selEx]||"3×10"}</div>
      {(REST_SEC[selEx]||0)>0&&<div style={{fontFamily:FB,fontSize:11,color:C.cyan}}>Rest: {(REST_SEC[selEx]||90)>=60?`${(REST_SEC[selEx]||90)/60} min`:`${REST_SEC[selEx]}s`}</div>}
    </div>}/>
    {(REST_SEC[selEx]||0)>0&&(tier==="pro"?(!showTimer?<button className="tap" onClick={()=>setShowTimer(true)} style={{width:"100%",padding:"12px",borderRadius:12,border:`1.5px solid ${C.cyan}44`,background:C.cyan+"18",color:C.cyan,fontFamily:FH,fontSize:15,letterSpacing:".08em",cursor:"pointer",marginBottom:10}}>⏱ START REST TIMER</button>:<RestTimer exName={selEx} onClose={()=>setShowTimer(false)}/>):(<LockedFeature tierRequired="pro" onUpgrade={()=>onUpgrade("pro")}><div style={{padding:14,background:C.card2,borderRadius:12,marginBottom:12,textAlign:"center"}}><div style={{fontFamily:FH,fontSize:14,color:C.cyan,marginBottom:4}}>⏱ REST TIMER</div><div style={{fontFamily:FB,fontSize:11,color:C.sub}}>Smart rest periods per exercise</div></div></LockedFeature>))}
    <Card ch={<div>
      <Sec ch="Log This Set" color={C.cyan}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:10}}>
        <Inp label="Sets" type="number" value={logF.sets} onChange={e=>setLogF({...logF,sets:e.target.value})}/>
        <Inp label="Reps" type="number" value={logF.reps} onChange={e=>setLogF({...logF,reps:e.target.value})}/>
        <Inp label="Weight (lbs)" type="number" placeholder="0" value={logF.weight} onChange={e=>setLogF({...logF,weight:e.target.value})}/>
      </div>
      <button className="tap" onClick={()=>logSet(selEx)} style={{width:"100%",padding:"13px",borderRadius:13,border:"none",background:`linear-gradient(135deg,${C.cyan},${C.cyan}CC)`,color:C.bg,fontFamily:FH,fontSize:16,letterSpacing:".1em",cursor:"pointer"}}>+ LOG THIS SET</button>
      {getLog(selEx).length>0&&<div style={{marginTop:12}}>
        <div style={{fontFamily:FH,fontSize:12,color:C.cyan,letterSpacing:".15em",marginBottom:8}}>{getLog(selEx).length} SETS LOGGED TODAY</div>
        {getLog(selEx).map((l,i)=>(<div key={i} style={{display:"flex",gap:7,padding:"6px 0",borderBottom:`1px solid ${C.border}`,alignItems:"center"}}><Tag ch={`${l.sets}×${l.reps}`} color={C.lime}/>{l.weight&&<Tag ch={`${l.weight}lbs`} color={C.amber}/>}<span style={{fontFamily:FB,fontSize:10,color:C.sub,marginLeft:"auto"}}>{l.time}</span></div>))}
      </div>}
    </div>}/>
  </div>);}

  const ExChip=({ex})=>(<div className="tap" onClick={()=>setSelEx(ex)} style={{fontFamily:FB,fontSize:11,fontWeight:700,background:C.card2,border:`1px solid ${C.border}`,borderRadius:8,padding:"7px 12px",color:C.text,cursor:"pointer",display:"flex",alignItems:"center",gap:4}}>{ex}<span style={{color:C.sub,fontSize:10}}>{EX_SETS[ex]||"3×10"}</span>{getLog(ex).length>0&&<span style={{background:C.lime+"33",color:C.lime,borderRadius:4,padding:"1px 5px",fontSize:9,fontWeight:800}}>✓{getLog(ex).length}</span>}</div>);

  return(<div>
    <WorkoutCalendar tracker={tracker}/>
    {tier==="free"&&<div>
      <div style={{background:C.amber+"18",border:`1px solid ${C.amber}33`,borderRadius:12,padding:"10px 14px",marginBottom:12}}><div style={{fontFamily:FB,fontSize:12,color:C.amber,fontWeight:700}}>🆓 Free — Basic Split</div><div style={{fontFamily:FB,fontSize:11,color:C.sub,marginTop:2}}>Upgrade for full weekly plan, custom days, muscle targeting.</div></div>
      <Card glow={gCol} ch={<div>
        <Sec ch={freeSplit.name} color={gCol}/>
        <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginBottom:10}}>{freeSplit.desc}</div>
        <Tag ch={freeSplit.days} color={gCol}/>
        <div style={{display:"flex",flexWrap:"wrap",gap:7,marginTop:12}}>{freeSplit.exercises.map((ex,i)=>(<ExChip key={i} ex={ex}/>))}</div>
      </div>}/>
      <LockedFeature tierRequired="basic" onUpgrade={()=>onUpgrade("basic")}><Card ch={<div><Sec ch="Full Weekly Plan"/><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>3, 4, or 5 days per week with Mon-Sun schedule.</div></div>}/></LockedFeature>
      <LockedFeature tierRequired="pro" onUpgrade={()=>onUpgrade("pro")}><Card ch={<div><Sec ch="Muscle Group Selector"/><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>Target specific muscles.</div></div>}/></LockedFeature>
    </div>}

    {tier==="basic"&&<div>
      <Card glow={gCol} ch={<div>
        <Sec ch="Training Days Per Week" color={gCol}/>
        <div style={{display:"flex",gap:8,marginBottom:10}}>{[3,4,5].map(n=>(<div key={n} className="tap" onClick={()=>setDays(n)} style={{width:46,height:46,borderRadius:11,background:days===n?gCol:C.card2,border:`2px solid ${days===n?gCol:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH,fontSize:20,color:days===n?C.bg:C.sub,cursor:"pointer"}}>{n}</div>))}</div>
      </div>}/>
      {week.map((session,i)=>{const isToday=session.day===todayDay,isRest=session.type==="rest";const col=isRest?C.sub:isToday?gCol:C.cyan;return(<div key={i} style={{background:isToday?gCol+"0F":C.card,border:`1.5px solid ${isToday?gCol:C.border}`,borderLeft:`4px solid ${col}`,borderRadius:14,padding:14,marginBottom:9}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:isRest?0:10}}>
          <div><div style={{fontFamily:FB,fontSize:9,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".15em"}}>{session.full}</div><div style={{fontFamily:FH,fontSize:17,color:col,letterSpacing:".04em",marginTop:2}}>{session.emoji} {session.focus}</div></div>
          <div style={{display:"flex",gap:5}}>{isToday&&<Tag ch="TODAY" color={gCol}/>}<Tag ch={isRest?"REST":"TRAIN"} color={isRest?C.sub:C.cyan}/></div>
        </div>
        {!isRest&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{session.exercises.map((ex,j)=>(<ExChip key={j} ex={ex}/>))}</div>}
      </div>);})}
      <LockedFeature tierRequired="pro" onUpgrade={()=>onUpgrade("pro")}><Card ch={<div><Sec ch="Muscle Group Selector + Rest Timer"/><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>Target muscles. Smart rest periods per exercise.</div></div>}/></LockedFeature>
    </div>}

    {tier==="pro"&&<div>
      <Card glow={gCol} ch={<div>
        <Sec ch="Training Days" color={gCol}/>
        <div style={{display:"flex",gap:8,marginBottom:8}}>{[3,4,5].map(n=>(<div key={n} className="tap" onClick={()=>setDays(n)} style={{width:46,height:46,borderRadius:11,background:days===n?gCol:C.card2,border:`2px solid ${days===n?gCol:C.border}`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH,fontSize:20,color:days===n?C.bg:C.sub,cursor:"pointer"}}>{n}</div>))}</div>
      </div>}/>
      <Card ch={<div>
        <Sec ch="Target Muscle Groups" color={gCol}/>
        <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginBottom:12}}>Select muscles for custom workout, or leave empty for weekly plan.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:selMuscles.length>0?12:0}}>{MUSCLE_GROUPS.map(mg=>(<div key={mg.key} className="tap" onClick={()=>setSelMuscles(p=>p.includes(mg.key)?p.filter(x=>x!==mg.key):[...p,mg.key])} style={{padding:"11px",borderRadius:11,border:`1.5px solid ${selMuscles.includes(mg.key)?mg.color:C.border}`,background:selMuscles.includes(mg.key)?mg.color+"22":C.card2,cursor:"pointer",display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:18}}>{mg.emoji}</span><div><div style={{fontFamily:FB,fontSize:12,fontWeight:800,color:selMuscles.includes(mg.key)?mg.color:C.text}}>{mg.label}</div></div>{selMuscles.includes(mg.key)&&<div style={{marginLeft:"auto",color:mg.color,fontSize:14}}>✓</div>}</div>))}</div>
        {selMuscles.length>0&&<div><div style={{fontFamily:FH,fontSize:13,color:gCol,letterSpacing:".1em",marginBottom:8}}>CUSTOM WORKOUT</div><div style={{display:"flex",flexWrap:"wrap",gap:7}}>{customExs.map((ex,i)=>(<ExChip key={i} ex={ex}/>))}</div></div>}
      </div>}/>
      {selMuscles.length===0&&week.map((session,i)=>{const isToday=session.day===todayDay,isRest=session.type==="rest";const col=isRest?C.sub:isToday?gCol:C.cyan;return(<div key={i} style={{background:isToday?gCol+"0F":C.card,border:`1.5px solid ${isToday?gCol:C.border}`,borderLeft:`4px solid ${col}`,borderRadius:14,padding:14,marginBottom:9}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:isRest?0:10}}>
          <div><div style={{fontFamily:FB,fontSize:9,fontWeight:700,color:C.sub,textTransform:"uppercase",letterSpacing:".15em"}}>{session.full}</div><div style={{fontFamily:FH,fontSize:17,color:col,letterSpacing:".04em",marginTop:2}}>{session.emoji} {session.focus}</div></div>
          <div style={{display:"flex",gap:5}}>{isToday&&<Tag ch="TODAY" color={gCol}/>}<Tag ch={isRest?"REST":"TRAIN"} color={isRest?C.sub:C.cyan}/></div>
        </div>
        {!isRest&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>{session.exercises.map((ex,j)=>(<ExChip key={j} ex={ex}/>))}</div>}
      </div>);})}
      {Object.keys(tracker).length>0&&<Card glow={C.purple} ch={<div><Sec ch="Workout History" color={C.purple}/>{Object.keys(tracker).sort().reverse().slice(0,5).map(date=>(<div key={date} style={{marginBottom:12}}><div style={{fontFamily:FH,fontSize:12,color:C.purple,letterSpacing:".1em",marginBottom:7}}>{date}</div>{Object.entries(tracker[date]).map(([exName,sets])=>(<div key={exName} style={{background:C.card2,borderRadius:9,padding:"9px 11px",marginBottom:5}}><div style={{fontFamily:FB,fontSize:12,fontWeight:700,color:C.text,marginBottom:4}}>{exName}</div><div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{sets.map((s,i)=>(<div key={i} style={{fontFamily:FB,fontSize:10,background:C.purple+"22",border:`1px solid ${C.purple}44`,borderRadius:5,padding:"2px 7px",color:C.purple}}>{s.sets}×{s.reps}{s.weight?` @ ${s.weight}lbs`:""}</div>))}</div></div>))}</div>))}</div>}/>}
    </div>}
  </div>);
}

// ─── NUTRITION TAB ────────────────────────────────────────
function NutritionTab({tier,results,onUpgrade,entries,setEntries}){
  const[form,setForm]=useState({name:"",calories:"",protein:"",carbs:"",fat:""});
  const[showQuick,setShowQuick]=useState(false);
  const[search,setSearch]=useState("");
  const totals=entries.reduce((a,e)=>({calories:a.calories+e.calories,protein:a.protein+e.protein,carbs:a.carbs+e.carbs,fat:a.fat+e.fat}),{calories:0,protein:0,carbs:0,fat:0});
  const filtered=QUICK_FOODS.filter(f=>f.name.toLowerCase().includes(search.toLowerCase()));
  function addEntry(){if(!form.name||!form.calories)return;setEntries([...entries,{id:Date.now(),name:form.name,calories:+form.calories||0,protein:+form.protein||0,carbs:+form.carbs||0,fat:+form.fat||0,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);setForm({name:"",calories:"",protein:"",carbs:"",fat:""});}
  function quickAdd(food){setEntries([...entries,{id:Date.now(),name:food.name,calories:food.cal,protein:food.p,carbs:food.c,fat:food.f,time:new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);setShowQuick(false);setSearch("");}
  const gColor={lose:C.coral,gain:C.cyan,recomp:C.lime}[results?.goal||"recomp"];
  return(<div>
    <div style={{background:`linear-gradient(135deg,${gColor}22,${gColor}08)`,border:`1.5px solid ${gColor}44`,borderRadius:18,padding:20,marginBottom:12}}>
      <div style={{fontFamily:FB,fontSize:10,fontWeight:700,color:gColor,textTransform:"uppercase",letterSpacing:".2em",marginBottom:2}}>Daily Calorie Target</div>
      <div style={{fontFamily:FH,fontSize:60,color:gColor,lineHeight:1}}>{results?.calories||"—"}</div>
      <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginTop:4}}>calories per day</div>
    </div>
    {(tier==="basic"||tier==="pro")&&results?.macros&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:9,marginBottom:12}}><SB label="Protein" value={`${results.macros.protein}g`} color={C.cyan}/><SB label="Carbs" value={`${results.macros.carbs}g`} color={C.lime}/><SB label="Fat" value={`${results.macros.fat}g`} color={C.coral}/></div>}
    {tier==="free"&&<LockedFeature tierRequired="basic" onUpgrade={()=>onUpgrade("basic")}><Card ch={<div><Sec ch="Macro Breakdown"/><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>See your exact protein, carbs, and fat targets.</div></div>}/></LockedFeature>}
    {tier==="pro"&&<div>
      <Card glow={C.lime} ch={<div>
        <Sec ch="Today's Progress"/>
        <div style={{display:"flex",justifyContent:"space-around",marginBottom:14}}>{[["Cal",totals.calories,results?.calories,C.lime],["Prot",totals.protein,results?.macros?.protein,C.cyan],["Carbs",totals.carbs,results?.macros?.carbs,C.amber],["Fat",totals.fat,results?.macros?.fat,C.coral]].map(([l,v,t,col])=>{const pct=t?Math.min(100,Math.round(v/t*100)):0;return(<div key={l} style={{textAlign:"center"}}><div style={{position:"relative",display:"inline-block"}}><Ring pct={pct} color={col} size={62} stroke={5}/><div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{fontFamily:FH,fontSize:12,color:col}}>{pct}%</div></div></div><div style={{fontFamily:FB,fontSize:9,color:C.sub,marginTop:4,textTransform:"uppercase"}}>{l}</div><div style={{fontFamily:FB,fontSize:10,color:col,fontWeight:700}}>{v}/{t||"?"}</div></div>);})}</div>
      </div>}/>
      <Card ch={<div>
        <Sec ch="Log a Meal"/>
        <div style={{background:C.lime+"11",border:`1px solid ${C.lime}22`,borderRadius:10,padding:"10px 13px",marginBottom:12}}><div style={{fontFamily:FB,fontSize:11,color:C.lime,fontWeight:700,marginBottom:2}}>📱 No measuring needed!</div><div style={{fontFamily:FB,fontSize:11,color:C.sub}}>Tap Quick Add to pick from 30 common foods.</div></div>

        {showQuick&&<div style={{marginBottom:12}}>
          <input placeholder="Search foods…" value={search} onChange={e=>setSearch(e.target.value)} style={{width:"100%",background:C.card2,border:`1.5px solid ${C.border}`,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:16,fontFamily:FB,outline:"none",marginBottom:8}}/>

            <button className="tap" onClick={()=>quickAdd(food)} style={{width:"100%",padding:"7px",borderRadius:8,border:"none",background:`linear-gradient(135deg,${C.lime},${C.lime}CC)`,color:C.bg,fontFamily:FH,fontSize:12,cursor:"pointer"}}>+ ADD NOW</button>
          </div>))}</div>
        </div>}
        <div style={{fontFamily:FB,fontSize:10,fontWeight:700,color:C.sub,textTransform:"uppercase",marginBottom:8}}>Or Enter Manually</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          <div style={{gridColumn:"1/-1"}}><Inp label="Food Name" placeholder="e.g. Grilled chicken" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          {["calories","protein","carbs","fat"].map(k=>(<Inp key={k} label={k+(k==="calories"?" (kcal)":" (g)")} type="number" placeholder="0" value={form[k]} onChange={e=>setForm({...form,[k]:e.target.value})}/>))}
        </div>
        <button className="tap" onClick={addEntry} style={{width:"100%",padding:"13px",borderRadius:13,border:"none",background:`linear-gradient(135deg,${C.lime},${C.lime}CC)`,color:C.bg,fontFamily:FH,fontSize:16,letterSpacing:".1em",cursor:"pointer"}}>+ ADD TO LOG</button>
      </div>}/>
      {entries.length>0&&<Card ch={<div>
        <Sec ch={`${entries.length} Item${entries.length===1?"":"s"} Today`}/>
        {entries.map(e=>(<div key={e.id} style={{display:"flex",gap:7,alignItems:"center",padding:"8px 0",borderBottom:`1px solid ${C.border}`,flexWrap:"wrap"}}><span style={{fontFamily:FB,fontSize:10,color:C.sub,minWidth:40}}>{e.time}</span><span style={{flex:1,fontFamily:FB,fontSize:12,fontWeight:700,minWidth:100}}>{e.name}</span><Tag ch={`${e.calories}kcal`} color={C.lime}/><Tag ch={`${e.protein}p`} color={C.cyan}/><button onClick={()=>setEntries(entries.filter(x=>x.id!==e.id))} style={{background:"none",border:"none",color:C.coral,cursor:"pointer",fontSize:18,padding:"0 4px"}}>×</button></div>))}
      </div>}/>}
    </div>}
    {(tier==="free"||tier==="basic")&&<LockedFeature tierRequired="pro" onUpgrade={()=>onUpgrade("pro")}><Card ch={<div><Sec ch="Food Log + Progress Rings"/><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>Track every meal. 30+ foods pre-loaded.</div></div>}/></LockedFeature>}
  </div>);
}

function App(){
  const saved=loadState();
  const[screen,setScreen]=useState(saved?.screen||"splash");
  const[tier,setTier]=useState(saved?.tier||"free");
  const[results,setResults]=useState(saved?.results||null);
  const[tab,setTab]=useState(saved?.tab||"fastfood");
  const[showPaywall,setShowPaywall]=useState(false);
  const[tracker,setTracker]=useState(saved?.tracker||{});
  const[entries,setEntries]=useState(saved?.entries||[]);
  
  // Auto-save state
  useEffect(()=>{saveState({screen,tier,results,tab,tracker,entries});},[screen,tier,results,tab,tracker,entries]);

  function openUpgrade(t){setShowPaywall(true);}
  function handleTierSelect(t){setTier(t);setShowPaywall(false);if(screen==="splash")setScreen("onboard");}

  const TABS=[{key:"fastfood",icon:"🚀",label:"Fast Food"},{key:"nutrition",icon:"🥗",label:"Nutrition"},{key:"workout",icon:"💪",label:"Train"},{key:"settings",icon:"⚙️",label:"Settings"}];

  if(screen==="splash")return(<div style={{minHeight:"100vh",background:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px"}}>
    <div style={{textAlign:"center",marginBottom:40}}>
      <div style={{fontFamily:FH,fontSize:52,color:C.lime,letterSpacing:".1em",lineHeight:1}}>⚡ FITCORE</div>
      <div style={{fontFamily:FB,fontSize:14,color:C.sub,letterSpacing:".15em",textTransform:"uppercase",marginTop:8}}>Your Body · Your Plan · Your Story</div>
    </div>
    <div style={{width:"100%",maxWidth:400}}>
      {Object.values(TIERS).map(t=>(<div key={t.id} className="tap" onClick={()=>{setTier(t.id);setScreen("onboard");}} style={{background:t.id==="pro"?`linear-gradient(135deg,${t.color}22,${t.color}08)`:C.card,border:`2px solid ${t.id==="pro"?t.color:C.border}`,borderRadius:16,padding:"18px 20px",marginBottom:10,cursor:"pointer",position:"relative"}}>
        {t.id==="pro"&&<div style={{position:"absolute",top:-10,right:16,background:`linear-gradient(135deg,${C.gold},${C.amber})`,color:C.bg,fontFamily:FH,fontSize:10,letterSpacing:".1em",padding:"3px 10px",borderRadius:20}}>MOST POPULAR</div>}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <span style={{fontSize:28}}>{t.icon}</span>
            <div><div style={{fontFamily:FH,fontSize:20,color:t.id==="pro"?t.color:C.text,letterSpacing:".06em"}}>{t.name}</div><div style={{fontFamily:FB,fontSize:11,color:C.sub,marginTop:2}}>{t.id==="free"?"Basic features — always free":t.id==="basic"?"Macros, meal plans, custom splits":"Everything — full customization"}</div></div>
          </div>
          <div style={{textAlign:"right"}}><div style={{fontFamily:FH,fontSize:22,color:t.id==="pro"?t.color:C.text}}>{t.price}</div><div style={{fontFamily:FB,fontSize:10,color:C.sub}}>{t.id==="free"?"forever":"/month"}</div></div>
        </div>
      </div>))}
    </div>
  </div>);

  if(screen==="onboard")return(<Onboarding onDone={r=>{setResults(r);setScreen("app");}}/>);

  return(<div style={{minHeight:"100vh",background:C.bg,fontFamily:FB,color:C.text,paddingBottom:72}}>
    {showPaywall&&<PaywallModal onSelect={handleTierSelect} onClose={()=>setShowPaywall(false)} currentTier={tier}/>}
    <div style={{background:"linear-gradient(160deg,#141923,#0B0F19)",borderBottom:`1px solid ${C.border}`,padding:"14px 18px 11px",position:"sticky",top:0,zIndex:100,backdropFilter:"blur(20px)"}}>
      <div style={{maxWidth:640,margin:"0 auto",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{fontFamily:FH,fontSize:24,color:C.lime,letterSpacing:".1em"}}>⚡ FITCORE</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {results?.calories&&<div style={{textAlign:"right"}}><div style={{fontFamily:FH,fontSize:18,color:C.cyan}}>{results.calories}</div><div style={{fontFamily:FB,fontSize:8,color:C.sub,textTransform:"uppercase",letterSpacing:".1em"}}>kcal/day</div></div>}
          <div className="tap" onClick={()=>openUpgrade()} style={{background:TIERS[tier].color+"22",border:`1px solid ${TIERS[tier].color}44`,borderRadius:8,padding:"5px 10px",cursor:"pointer"}}>
            <div style={{fontFamily:FH,fontSize:12,color:TIERS[tier].color,letterSpacing:".06em"}}>{TIERS[tier].icon} {TIERS[tier].name.toUpperCase()}</div>
          </div>
        </div>
      </div>
    </div>
    <div style={{maxWidth:640,margin:"0 auto",padding:"16px 14px"}}>
      {tab==="fastfood"&&<FastFoodTab tier={tier} onUpgrade={openUpgrade}/>}
      {tab==="nutrition"&&<NutritionTab tier={tier} results={results} onUpgrade={openUpgrade} entries={entries} setEntries={setEntries}/>}
      {tab==="workout"&&<WorkoutTab tier={tier} results={results} onUpgrade={openUpgrade} tracker={tracker} setTracker={setTracker}/>}
      {tab==="settings"&&<div>
        <Card glow={C.lime} ch={<div>
          <Sec ch="Your Plan"/>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:14}}><span style={{fontSize:32}}>{TIERS[tier].icon}</span><div><div style={{fontFamily:FH,fontSize:22,color:TIERS[tier].color,letterSpacing:".06em"}}>{TIERS[tier].name} Plan</div><div style={{fontFamily:FB,fontSize:12,color:C.sub}}>{TIERS[tier].price}{tier!=="free"?"/month":" forever"}</div></div></div>
          <Btn ch="⬆ UPGRADE PLAN" color={C.lime} onClick={()=>openUpgrade()}/>
        </div>}/>
        <Card ch={<div>
          <Sec ch="Your Stats"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}}><SB label="Daily Cal" value={results?.calories||"—"} color={C.lime}/><SB label="Goal" value={results?.goal==="lose"?"Fat Loss":results?.goal==="gain"?"Muscle Gain":"Recomp"} color={C.cyan}/></div>
          <button className="tap" onClick={()=>setScreen("onboard")} style={{width:"100%",padding:"11px",borderRadius:11,border:`1px solid ${C.border}`,background:"transparent",color:C.sub,fontFamily:FH,fontSize:13,letterSpacing:".08em",cursor:"pointer",marginTop:10}}>↺ RECALCULATE</button>
        </div>}/>
        <Card ch={<div>
          <Sec ch="Reset Data"/>
          <div style={{fontFamily:FB,fontSize:12,color:C.sub,marginBottom:10}}>Clear everything and start over.</div>
          <button className="tap" onClick={()=>{if(confirm("Clear all data?")){localStorage.removeItem(STORAGE_KEY);location.reload();}}} style={{width:"100%",padding:"11px",borderRadius:11,border:`1px solid ${C.coral}44`,background:C.coral+"18",color:C.coral,fontFamily:FH,fontSize:13,letterSpacing:".08em",cursor:"pointer"}}>🗑 RESET ALL DATA</button>
        </div>}/>
      </div>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,background:`${C.surface}EE`,backdropFilter:"blur(20px)",borderTop:`1px solid ${C.border}`,display:"flex",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
      {TABS.map(t=>(<button key={t.key} className="tap" onClick={()=>setTab(t.key)} style={{flex:1,padding:"9px 2px 11px",border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===t.key?C.lime:C.sub}}>
        <div style={{fontSize:17,lineHeight:1}}>{t.icon}</div>
        <div style={{fontFamily:FB,fontSize:8,fontWeight:800,textTransform:"uppercase",letterSpacing:".06em"}}>{t.label}</div>
        {tab===t.key&&<div style={{width:14,height:2,borderRadius:2,background:C.lime,marginTop:2}}/>}
      </button>))}
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
